<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đang chuyển đến Discord...</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:15px 30px;
font-size:20px;
background:#00ff99;
border:none;
border-radius:8px;
display:none;
}

</style>

<script>

let time = 8;

function countdown(){
document.getElementById("time").innerText = time;

if(time <= 0){
document.getElementById("btn").style.display="inline-block";
}else{
time--;
setTimeout(countdown,1000);
}
}

window.onload = countdown;

// LOAD ADS SAU 3s (không bị spam)
setTimeout(()=>{
  let s=document.createElement("script");
  s.src="https://pl28928436.effectivegatecpm.com/e0/ce/e7/e0cee741254541fa379b3b6f55d4be7c.js";
  document.body.appendChild(s);
},3000);

// CLICK = KIẾM TIỀN
function goDiscord(){

  // mở quảng cáo lần 2
  window.open("https://example.com","_blank");

  // delay rồi vào discord
  setTimeout(()=>{
    window.location.href="https://discord.gg/kYmPCKJ3X";
  },1500);
}

</script>

</head>

<body>

<h2>🔒 Đang xác minh người dùng...</h2>

<p>Vui lòng chờ <span id="time">8</span> giây</p>

<p style="color:#888;">(Bước này giúp chống bot và bảo vệ shop)</p>

<button id="btn" onclick="goDiscord()">
👉 Tiếp tục vào Discord
</button>

</body>
</html>
