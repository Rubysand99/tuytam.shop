<!DOCTYPE html>

<title>Đang chuyển đến Discord...</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:15px 30px;
font-size:20px;
background:#00ff99;
border:none;
border-radius:8px;
display:none;
cursor:pointer;
}

button:hover{
background:#00cc77;
}
</style>

<script>

let time = 8;

function countdown(){
  document.getElementById("time").innerText = time;

  if(time <= 0){
    document.getElementById("btn").style.display="inline-block";
  }else{
    time--;
    setTimeout(countdown,1000);
  }
}

window.onload = countdown;

// load quảng cáo sau 3s
setTimeout(()=>{
  let s=document.createElement("script");
  s.src="https://pl28928436.profitablecpmratenetwork.com/e0/ce/e7/e0cee741254541fa379b3b6f55d4be7c.js";
  document.body.appendChild(s);
},3000);

// CLICK → KIẾM TIỀN
function goDiscord(){
  window.open("https://link-target.net/1359000/25H5eIkwXq9L","_blank");
}

</script>

</head>

<body>

<h2>🔒 Đang xác minh người dùng...</h2>

<p>Vui lòng chờ <span id="time">8</span> giây</p>
