<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đang xác minh...</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:radial-gradient(circle,#000,#111,#000);
overflow:hidden;
}

/* glow background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#00ffcc,#ff00cc,#00ffcc);
animation:spin 10s linear infinite;
opacity:0.08;
z-index:-1;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.container{
margin-top:120px;
}

button{
padding:15px 30px;
font-size:20px;
background:#00ff99;
border:none;
border-radius:8px;
display:none;
cursor:pointer;
box-shadow:0 0 15px #00ff99;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00ff99;
}

#time{
color:#ff4444;
font-weight:bold;
}

</style>

<script>

let time = 8;

function countdown(){
document.getElementById("time").innerText = time;

if(time <= 0){
document.getElementById("btn").style.display="inline-block";
}else{
time--;
setTimeout(countdown,1000);
}
}

window.onload = countdown;

// load ads
setTimeout(()=>{
  let s=document.createElement("script");
  s.src="https://pl28928436.profitablecpmratenetwork.com/e0/ce/e7/e0cee741254541fa379b3b6f55d4be7c.js";
  document.body.appendChild(s);
},3000);

// mở link kiếm tiền
function goDiscord(){
  window.open("https://link-target.net/1359000/25H5eIkwXq9L","_blank");
}

</script>

</head>

<body>

<div class="container">

<h2>🔒 Đang xác minh người dùng...</h2>

<p>Vui lòng chờ <span id="time">8</span> giây</p>

<p style="color:#888;">(Chống bot & bảo vệ shop)</p>

<p style="color:#00ffcc;">🟢 10–20 người đang truy cập</p>

<p style="color:#ffaa00;">⚠ Sau khi vượt link, bạn sẽ vào Discord</p>

<button id="btn" onclick="goDiscord()">
👉 Tiếp tục
</button>

</div>

</body>
</html>
