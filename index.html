<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuyTam Store | DonutSMP</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#1a1a1a,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

/* background glow */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#00ffcc,#ff00cc,#00ffcc);
animation:moveBg 10s linear infinite;
opacity:0.05;
z-index:-1;
}

@keyframes moveBg{
0%{transform:translate(-25%,-25%) rotate(0deg);}
100%{transform:translate(-25%,-25%) rotate(360deg);}
}

header{
background:linear-gradient(90deg,#ff9900,#ff5500);
padding:20px;
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px #ff9900;
}

/* card */
.card{
background:#111;
padding:20px;
border-radius:12px;
max-width:800px;
margin:20px auto;
box-shadow:0 0 25px rgba(0,255,150,0.2);
}

/* button */
button{
background:#00ff99;
border:none;
padding:14px 22px;
font-size:18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
box-shadow:0 0 10px #00ff99;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00ff99;
}

/* countdown */
#countdown{
color:#ff4444;
font-weight:bold;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

/* fake buy */
.fake-buy{
margin-top:15px;
color:#00ffcc;
font-size:14px;
text-shadow:0 0 5px #00ffcc;
}

/* floating particles */
.particle{
position:fixed;
width:5px;
height:5px;
background:#00ffcc;
border-radius:50%;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<header>✨ TUYTAM STORE ✨</header>

<div class="card">

<h2>Shop uy tín hàng đầu DONUTSMP</h2>

<p style="color:#00ffcc;">🟢 <span id="online"></span> người đang online</p>
<p style="color:#ffaa00;">⭐ 4.8/5 từ 300+ khách hàng</p>

<p id="countdown">🔥 Ưu đãi kết thúc sau: 05:00</p>

<h3>🛒 Mặt hàng:</h3>

<p>🦴 Spawner - 💰 Money - ⚔️ Gear OP</p>

<button onclick="goRedirect()">🔥 MUA NGAY</button>

<div class="fake-buy" id="fakeBuy"></div>

</div>

<script>

// online fake
document.getElementById("online").innerText = 10 + Math.floor(Math.random()*15);

// countdown
let time = 300;
setInterval(()=>{
  time--;
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("countdown").innerText =
  `🔥 Ưu đãi kết thúc sau: ${m}:${s<10?'0'+s:s}`;
},1000);

// fake buy
let names=["An","Bình","Huy","Nam","Tuấn","Minh"];
let items=["Spawner","Money","Gear"];

setInterval(()=>{
  let n=names[Math.floor(Math.random()*names.length)];
  let i=items[Math.floor(Math.random()*items.length)];
  document.getElementById("fakeBuy").innerText =
  `✔ ${n} vừa mua ${i}`;
},3000);

// particles
for(let i=0;i<20;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(p);
}

// ads delay
setTimeout(()=>{
 let s=document.createElement("script");
 s.src="https://pl28928436.profitablecpmratenetwork.com/e0/ce/e7/e0cee741254541fa379b3b6f55d4be7c.js";
 document.body.appendChild(s);
},8000);

// redirect
function goRedirect(){
  window.location.href="redirect.html";
}

</script>

</body>
</html>
