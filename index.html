<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuyTam Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:white;
text-align:center;
}

/* gradient gaming background */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 0%, #00ffcc20, transparent 60%);
z-index:-1;
}

/* header */
header{
background:#111;
padding:20px;
font-size:26px;
font-weight:bold;
border-bottom:1px solid #222;
}

/* card */
.card{
background:#141a20;
padding:25px;
border-radius:12px;
max-width:700px;
margin:30px auto;
box-shadow:0 0 20px rgba(0,255,200,0.08);
}

/* button */
button{
padding:14px 20px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
width:80%;
}

.buy{
background:#00ff99;
color:black;
}

.donate{
background:#ffaa00;
color:black;
}

button:hover{
opacity:0.9;
}

/* trust box */
.trust{
display:flex;
justify-content:space-around;
margin-top:20px;
font-size:14px;
color:#aaa;
}

/* highlight */
.highlight{
color:#00ffcc;
}

/* divider */
.divider{
height:1px;
background:#222;
margin:20px 0;
}
</style>
</head>

<body>

<header>🎮 TUYTAM STORE</header>

<div class="card">

<h2>DonutSMP Shop</h2>

<p class="highlight">🟢 <span id="online"></span> người đang online</p>

<div class="trust">
<div>⚡ Giao nhanh</div>
<div>🔒 An toàn</div>
<div>💬 Hỗ trợ Discord</div>
</div>

<div class="divider"></div>

<h3>🛒 Sản phẩm</h3>
<p>Spawner • Money • Gear</p>

<button class="buy" onclick="goRedirect()">🔥 MUA NGAY</button>

<button class="donate" onclick="goDonate()">
💖 NHẬN TIỀN MIỄN PHÍ
</button>

<p style="color:#888;">
👉 Vượt link → gửi code → nhận tiền
</p>

</div>

<script>

// online
document.getElementById("online").innerText =
10 + Math.floor(Math.random()*20);

// ads delay
setTimeout(()=>{
 let s=document.createElement("script");
 s.src="https://pl28928436.profitablecpmratenetwork.com/e0/ce/e7/e0cee741254541fa379b3b6f55d4be7c.js";
 document.body.appendChild(s);
},8000);

function goRedirect(){
  window.location.href="redirect.html";
}

function goDonate(){
  window.location.href="donate.html";
}

</script>

</body>
</html>
