<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuyTam Store</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Minecraft', Arial;
background:#0b0f14;
color:white;
overflow-x:hidden;
}

/* 🌌 background */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-2;
background:linear-gradient(270deg,#0b0f14,#001a1a,#002b36,#0b0f14);
background-size:600% 600%;
animation:gradientMove 15s ease infinite;
}
@keyframes gradientMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* ⚡ LIVE MODE */
.live-mode{
background:linear-gradient(270deg,#0b0f14,#001f2b,#003344,#0b0f14);
animation:gradientMove 8s ease infinite;
}

.overlay-dark{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* particles */
.particle{
position:absolute;
width:3px;
height:3px;
background:#00ffff;
border-radius:50%;
animation:float linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* loading */
#loading{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}
.bar{width:300px;height:20px;border:2px solid #fff}
.progress{
height:100%;
background:#00ffff;
width:0;
animation:load 3s forwards;
}
@keyframes load{to{width:100%}}

/* header */
header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
box-shadow:0 0 10px #00ffff;
}

/* sidebar */
.sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#111;
padding:20px;
transform:translateX(-100%);
transition:0.3s;
z-index:999;
}
.sidebar.active{transform:translateX(0);}

.sidebar button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
cursor:pointer;
font-family:'Minecraft';
}

/* card */
.card{
background:rgba(20,26,32,0.9);
padding:20px;
margin:20px auto;
max-width:900px;
border:2px solid #00ffff;
}

/* inventory */
.inventory{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

/* item */
.item{
background:#1a1a1a;
border:2px solid #555;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}
.item:hover{
border:2px solid #00ffff;
box-shadow:0 0 10px #00ffff,0 0 20px #00ffff;
transform:scale(1.05);
}

.item img{
width:60px;
image-rendering:pixelated;
}

/* chart */
#viewerChart{
background:#0f141a;
border:2px solid #ffffff;
box-shadow:0 0 10px #00ffff;
padding:10px;
border-radius:10px;
}

#liveCard.live-glow{
box-shadow:0 0 20px #00ffff,0 0 40px #00ffff;
}

/* popup */
#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:30px;
border:2px solid #00ffff;
box-shadow:0 0 20px #00ffff;
z-index:9999;
text-align:center;
}

.live-text{
color:#00ffff;
text-shadow:0 0 10px #00ffff;
}

/* footer */
.footer{
text-align:center;
padding:20px;
background:#111;
margin-top:40px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay-dark"></div>

<!-- loading -->
<div id="loading">
<h2>Đang tải...</h2>
<div class="bar"><div class="progress"></div></div>
</div>

<header>
☰ TUYTAM STORE
<div onclick="toggleMenu()">☰</div>
</header>

<div class="sidebar" id="menu">
<h3>Menu</h3>
<button onclick="goBuy()">Trang chủ</button>
</div>

<!-- SHOP -->
<div class="card">
<h2>DonutSMP Shop</h2>

<div class="inventory">
<div class="item"><p>💸 Money</p></div>
<div class="item"><p>🦴 Skeleton</p></div>
<div class="item"><p>🪽 Elytra</p></div>
</div>
</div>

<!-- 📊 DASHBOARD -->
<div class="card" id="liveCard">
<h3 class="live-text">📊 Live Dashboard</h3>
<canvas id="viewerChart"></canvas>

<p>👀 Current: <span id="current">0</span></p>
<p>🔥 Peak: <span id="peak">0</span></p>
<p>📈 Avg: <span id="avg">0</span></p>
</div>

<!-- popup -->
<div id="popup">
<h2 class="live-text">⚡ ĐANG LIVE</h2>
<button onclick="openLive()">Xem ngay</button>
</div>

<div class="footer">
<p>Made by ruby</p>
</div>

<audio id="clickSound" src="https://www.myinstants.com/media/sounds/minecraft-click.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// loading
setTimeout(()=>{document.getElementById("loading").style.display="none";},2000);

// menu
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

// sound
function goBuy(){
document.getElementById("clickSound").play();
}

// popup
function openLive(){
window.open("https://tiktok.com/@tuytam156","_blank");
}

// chart
let dataArr = [];
let labels = [];
let peak = 0;

const ctx = document.getElementById('viewerChart').getContext('2d');

const chart = new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
data:dataArr,
borderColor:"#00ffff",
tension:0.4
}]
}
});

// websocket
let ws = new WebSocket("ws://localhost:8765");

ws.onmessage = (event)=>{
let data = JSON.parse(event.data);

if(data.live){
document.body.classList.add("live-mode");

// update chart
dataArr.push(data.viewer);
labels.push("");

if(dataArr.length>30){
dataArr.shift();
labels.shift();
}

document.getElementById("current").innerText = data.viewer;

if(data.viewer>peak) peak=data.viewer;
document.getElementById("peak").innerText = peak;

let avg = dataArr.reduce((a,b)=>a+b,0)/dataArr.length;
document.getElementById("avg").innerText = Math.round(avg);

chart.update();

// popup
document.getElementById("popup").style.display="block";
setTimeout(()=>{document.getElementById("popup").style.display="none"},3000);

}else{
document.body.classList.remove("live-mode");
}
};
</script>

</body>
</html>
